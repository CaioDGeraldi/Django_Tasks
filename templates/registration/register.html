<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Novo usuário</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <h1 class="text-center mt-5">Cadastrar Usuário</h1>
        <form action="{% url 'register' %}" method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="usuario" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="usuario" name="username">
                {{form.username.errors}}

                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha" name="password1">
                {{form.password1.errors}}

                <label for="senha" class="form-label">Confirmar Senha</label>
                <input type="password" class="form-control" id="confirmarsenha" name="password2">
                {{form.password2.errors}}
            </div>
            <div>
                <button class="btn btn-primary">Cadastrar</button>
            </div>
        </form>
    </div>
</body>

</html>
