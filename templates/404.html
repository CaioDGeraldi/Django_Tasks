{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada - 404</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container py-5">
        <div class="row align-items-center justify-content-center text-center text-md-start g-5">

            <div class="col-12 col-md-6 order-md-1">
                <span class="badge text-bg-danger text-uppercase fw-bold px-3 py-2 mb-3 rounded-pill">
                    Erro 404
                </span>
                <h1 class="display-3 fw-bold text-dark mb-3">
                    Ops! Você se perdeu?
                </h1>
                <p class="lead text-secondary mb-4 fs-5">
                    A página que você está procurando não existe, foi removida ou mudou de endereço. Não se preocupe,
                    acontece com os melhores navegadores!
                </p>

                <div class="d-grid d-sm-flex gap-3">
                    <a href="{% url 'index' %}" class="btn btn-primary btn-lg px-4 py-3 fw-bold rounded-3 shadow-sm">
                        Voltar para a página inicial
                    </a>
                    <a href="javascript:history.back()"
                        class="btn btn-outline-secondary btn-lg px-4 py-3 fw-bold rounded-3">
                        Página Anterior
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
